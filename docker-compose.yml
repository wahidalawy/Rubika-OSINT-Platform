version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rubika_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: rubika_osint
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rubika_cache
    restart: always
    ports:
      - "6380:6379"

  # اضافه شدن سرویس ربات پایتونی ما
  bot:
    build: .
    container_name: rubika_engine
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: